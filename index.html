<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>app name</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="app">
      <div class ="titlesection">
        <div class="nav">
          <img src="assets/close.png" alt="close" />
          <img src="assets/minimize.png" alt="minimize" />
        </div>
        <h1>meepodoro timer</h1>
      </div>
      <div class="card">
        <div class="woodcock">
          <img id="woodcockpng"src ="assets/woodcock-idle-cropped.png" alt="pixel drawing of an american woodcock" />
        </div>
        <div class="timer">
          <h2 id="timer">25:00</h2>
        </div>
        <div class="buttons">
          <button id="start-focus">start focus</button>
          <div id="midbuttons">
            <button id="start-break">start break</button>
            <button id="reset">reset</button>
          </div>
          <button id="end-break">end break</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
